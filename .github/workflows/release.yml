name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Windows executable
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags "-s -w -H=windowsgui" -o dist/POPack.exe .
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/POPack.exe --title "$GITHUB_REF_NAME" --generate-notes
